name: Fitz-NetHardcore
version: ${project.version}
main: org.fitznet.doomdns.hardcore.FitzNetHardcore
api-version: '1.21'
folia-supported: true
authors: [MatthewFitzgerald]
description: Hardcore mod with lives system, resurrection mechanics, and spectator mode. Supports both Paper and Folia.
website: fitznet.doomdns.org
commands:
  fitznet:
    description: Display plugin status and admin help.
    usage: /<command>
    permission: fitznethardcore.admin
  lives:
    description: Display how many lives you have left.
    usage: /<command>
  addlife:
    description: Add one life (admin only, can exceed cap).
    usage: /addlife [player]
    permission: fitznethardcore.admin
  sublife:
    description: Remove one life.
    usage: /sublife [player]
    permission: fitznethardcore.admin
  setlife:
    description: Set a player's lives to a specific amount.
    usage: /setlife <player> <amount>
    permission: fitznethardcore.admin
  givelife:
    description: Give one of your lives to another player.
    usage: /givelife <player>
  revive:
    description: Set target player for resurrection. Place diamond block and right-click to revive.
    usage: /revive <player>
  fndebug:
    description: Show online player life state summary.
    usage: /<command>
    permission: fitznethardcore.admin
permissions:
  fitznethardcore.admin:
    description: Administrative commands
    default: op
  fitznethardcore.givelife:
    description: Allow giving lives to other players
    default: true
  fitznethardcore.resurrect:
    description: Allow resurrecting dead players
    default: true
